 <!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:lilypad.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:dialilypad.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Goldfish.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      ply-model="src:NormalLilypad.ply"

      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
  ply-model="src: Duck.ply"
  position="0 1 -2"
  rotation="-90 0 90"

  animation__move1="
    property: position;
    from: -12 1 -8;
    to: 12 1 -8;
    dur: 8000;
    easing: linear;
    startEvents: loaded, animationcomplete__move4;
  "

  animation__turn1="
  property: rotation;
  to: -90 90 90;
  dur: 800;
  easing: linear;
  startEvents: animationcomplete__move1;
  "

  animation__move2="
    property: position;
    from: 12 1 -8;
    to: 12 1 -4;
    dur: 4000;
    easing: linear;
    startEvents: animationcomplete__move1;
  "
animation__turn2="
    property: rotation;
    to: -90 180 90;
    dur: 800;
    easing: linear;
    startEvents: animationcomplete__move2;
  "

  


  animation__move3="
    property: position;
    from: 12 1 -4;
    to: -12 1 -4;
    dur: 8000;
    easing: linear;
    startEvents: animationcomplete__move2;
  "

  animation__move4="
    property: position;
    from: -12 1 -4;
    to: -12 1 -8;
    dur: 4000;
    easing: linear;
    startEvents: animationcomplete__move3;
  "

></a-entity>

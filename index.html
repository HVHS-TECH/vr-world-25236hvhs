 <!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:lilypad.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:dialilypad.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Goldfish.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:NormalLilypad.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Shark.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Boat.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Duck.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      animation_first="
        easing: linear;
        property: position;
        from: -12 1 -8;
        to: 12 1 -8;
        dur: 8000;
        startEvents: loaded, animationcomplete_forth"
      animation_second="
        easing: linear;
        property: position;
        from: 12 1 -8;
        to:12 1 -4;
        dur:4000;
        startEvents: loaded, animationcomplete_first"
      animation_third="
        easing: linear;
        property: position;
        from: 12 1 -8;
        to:12 1 -4;
        dur:4000;
        startEvents: loaded, animationcomplete_first"
      "

      ></a-entity>

      <a-entity 
      ply-model="src:Mapcorner1.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:Mapcorner2.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>
                 
      <a-entity 
      ply-model="src:Middleocean.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>
                 
      <a-entity 
      ply-model="src:Mapedge1S.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>
                 
      <a-entity 
      ply-model="src:Mapcorner3.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>
                 
      <a-entity 
      ply-model="src:Mapedge1L.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

       <a-entity 
      ply-model="src:Mapedge2L.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

       <a-entity 
      ply-model="src:Mapedge3L.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

       <a-entity 
      ply-model="src:Mapedge4L.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

       <a-entity 
      ply-model="src:Mapcorner4.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>

       <a-entity 
      ply-model="src:Mapedge2S.ply"
      position="0 1 -2"
      rotation="-90 0 90"
      ></a-entity>
                 
                 
    </a-scene>
  </body>
</html>
